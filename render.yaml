# render.yaml — Render.com deployment configuration for the Spring Boot backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: moriah-tech-labs-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: mysql
      - key: DB_HOST
        sync: false   # Set manually in Render dashboard (from Railway)
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: moriah_leads
      - key: DB_USERNAME
        sync: false   # Set manually in Render dashboard
      - key: DB_PASSWORD
        sync: false   # Set manually in Render dashboard
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # Set manually in Render dashboard
      - key: MAIL_USERNAME
        sync: false   # Your Gmail address
      - key: MAIL_PASSWORD
        sync: false   # Your Gmail App Password
      - key: CORS_ALLOWED_ORIGIN
        sync: false   # Set to your Vercel URL after frontend is deployed
