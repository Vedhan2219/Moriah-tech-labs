# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL (XAMPP) Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/moriah_leads?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Email (update with real SMTP credentials) ────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Admin credentials (override via env vars in production) ──────────────────
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:moriah@2024}

# ─── CORS allowed origin (set CORS_ALLOWED_ORIGIN env var in production) ─────
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.moriah=DEBUG